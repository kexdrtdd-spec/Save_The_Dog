<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Save The Doge - พลังชีวิต 5 จุด</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        #menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: absolute;
            background: #2c3e50;
            z-index: 20;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            color: #f1c40f;
            text-shadow: 2px 2px #000;
            text-align: center;
        }

        p.subtitle {
            margin: 0 0 25px 0;
            color: #bdc3c7;
            font-size: 1rem;
        }

        .btn-mode {
            width: 85%;
            max-width: 320px;
            padding: 12px;
            margin: 6px 0;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .btn-mode:active { transform: scale(0.95); }
        .mode-0 { background: #2ecc71; }
        .mode-1 { background: #3498db; }
        .mode-2 { background: #f39c12; }
        .mode-3 { background: #e67e22; }
        .mode-4 { background: #c0392b; }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-top: 10px;
        }

        canvas {
            background: #ecf0f1;
            border: 4px solid #34495e;
            border-radius: 10px;
            display: block;
            width: 100%;
            height: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .overlay-screen {
            display: none;
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 6px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
        }

        .overlay-screen h2 { font-size: 2.5rem; margin: 0 0 15px 0; text-shadow: 2px 2px #000; }
        .overlay-screen button {
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            background: #f1c40f;
            border: none;
            border-radius: 8px;
            color: #000;
        }

        #winScreen h2 { color: #2ecc71; }
        #loseScreen h2 { color: #e74c3c; }

        .top-info {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 600px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1>🐝 SAVE THE DOGE 🐶</h1>
        <p class="subtitle">ระบบใหม่! หมามีพลังชีวิต 5 จุด ผึ้งต่อยแล้วหมดฤทธิ์ทันที</p>
        <button class="btn-mode mode-0" onclick="startGame(0)">👶 โหมดเบบี๋</button>
        <button class="btn-mode mode-1" onclick="startGame(1)">😊 ง่ายเพลินๆสิ</button>
        <button class="btn-mode mode-2" onclick="startGame(2)">😐 ระดับปกติธรรมดา</button>
        <button class="btn-mode mode-3" onclick="startGame(3)">🔥 ยากชิบหายไฟลุก</button>
        <button class="btn-mode mode-4" onclick="startGame(4)">💀 เป็นไปไม่ได้มั้งเตือนแล้วนะ</button>
    </div>

    <div class="top-info">
        <span id="currentModeTxt">โหมด: -</span>
        <span id="timerTxt">เวลาที่ต้องรอด: 0s</span>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="600" height="500"></canvas>
        
        <div id="winScreen" class="overlay-screen">
            <h2>🏆 รอดตายแล้ว!</h2>
            <p style="margin: 0 0 15px 0;">หมาน้อยปลอดภัยดี</p>
            <button onclick="backToMenu()">กลับไปหน้าเมนู</button>
        </div>

        <div id="loseScreen" class="overlay-screen">
            <h2>😭 โดนต่อยยับจนเลือดหมด!</h2>
            <p style="margin: 0 0 15px 0;" id="loseMsg">หมาหัวโนเป็นลูกมะนาวเลย</p>
            <button onclick="backToMenu()">กลับไปหน้าเมนู</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const winScreen = document.getElementById('winScreen');
const loseScreen = document.getElementById('loseScreen');
const timerTxt = document.getElementById('timerTxt');
const currentModeTxt = document.getElementById('currentModeTxt');

let isDrawing = false;
let lines = []; 
let currentLine = [];
let bees = [];
let dog = { x: 300, y: 250, radius: 30, vx: 0, vy: 0, hp: 5 }; 
let gameStarted = false;
let gameState = "drawing"; 
let survivalTimer = 6; 
let timerInterval = null;
let currentDifficulty = 0;

const difficultySettings = [
    { name: "โหมดเบบี๋ 👶", count: 3, speed: 1.5, push: 0.1 },
    { name: "ง่ายเพลินๆสิ 😊", count: 8, speed: 2.5, push: 0.3 },
    { name: "ระดับปกติ 😐", count: 20, speed: 4.0, push: 0.6 },
    { name: "ยากชิบหาย 🔥", count: 40, speed: 6.5, push: 1.2 },
    { name: "เป็นไปไม่ได้ 💀", count: 85, speed: 9.5, push: 2.2 }
];

class Bee {
    constructor(difficulty) {
        const side = Math.floor(Math.random() * 4);
        if(side === 0) { this.x = Math.random() * canvas.width; this.y = -20; }
        else if(side === 1) { this.x = canvas.width + 20; this.y = Math.random() * canvas.height; }
        else if(side === 2) { this.x = Math.random() * canvas.width; this.y = canvas.height + 20; }
        else { this.x = -20; this.y = Math.random() * canvas.height; }

        this.radius = 8;
        this.baseSpeed = difficultySettings[difficulty].speed;
        this.pushPower = difficultySettings[difficulty].push;
        this.hasStung = false; 
    }

    update() {
        if (gameState === "drawing") return; 

        if (this.hasStung) {
            this.y -= 3;
            this.x += (Math.random() - 0.5) * 2;
            return;
        }

        let dx = dog.x - this.x;
        let dy = dog.y - this.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > 1) {
            this.x += (dx / dist) * this.baseSpeed + (Math.random() - 0.5) * 2;
            this.y += (dy / dist) * this.baseSpeed + (Math.random() - 0.5) * 2;
        }

        lines.forEach(line => {
            for (let i = 0; i < line.length - 1; i++) {
                let p1 = line[i];
                let p2 = line[i+1];
                if (this.checkCollisionWithSegment(this.x, this.y, p1, p2)) {
                    let bounceX = (p1.y - p2.y);
                    let bounceY = (p2.x - p1.x);
                    let bDist = Math.sqrt(bounceX*bounceX + bounceY*bounceY);
                    
                    this.x += (bounceX / bDist) * (this.baseSpeed * 1.5);
                    this.y += (bounceY / bDist) * (this.baseSpeed * 1.5);
                    
                    p1.x += (dx / dist) * this.pushPower;
                    p1.y += (dy / dist) * this.pushPower;
                }
            }
        });

        let dogDx = this.x - dog.x;
        let dogDy = this.y - dog.y;
        let dogDist = Math.sqrt(dogDx * dogDx + dogDy * dogDy);
        
        if (dogDist < this.radius + dog.radius) {
            this.hasStung = true; 
            dog.hp--; 
            
            if (dog.hp <= 0) {
                triggerLose(); 
            }
        }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.hasStung ? "#7f8c8d" : "#f1c40f"; 
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#000000";
        ctx.stroke();
    }

    checkCollisionWithSegment(cx, cy, p1, p2) {
        let l2 = (p1.x - p2.x)**2 + (p1.y - p2.y)**2;
        if (l2 === 0) return false;
        let t = ((cx - p1.x) * (p2.x - p1.x) + (cy - p1.y) * (p2.y - p1.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        let projX = p1.x + t * (p2.x - p1.x);
        let projY = p1.y + t * (p2.y - p1.y);
        let distSq = (cx - projX)**2 + (cy - projY)**2;
        return distSq < (this.radius + 3)**2;
    }
}

function startGame(difficulty) {
    currentDifficulty = difficulty;
    menu.style.display = 'none';
    winScreen.style.display = 'none';
    loseScreen.style.display = 'none';
    
    lines = [];
    currentLine = [];
    bees = [];
    dog = { x: 300, y: 220, radius: 32, vx: 0, vy: 0, hp: 5 }; 
    gameState = "drawing";
    survivalTimer = 6;
    gameStarted = true;

    currentModeTxt.innerText = "โหมด: " + difficultySettings[difficulty].name;
    timerTxt.innerText = "สถานะ: วาดเส้นป้องกันรอบตัวหมา!";

    for (let i = 0; i < difficultySettings[difficulty].count; i++) {
        bees.push(new Bee(difficulty));
    }
}

function startCountdown() {
    gameState = "countdown";
    survivalTimer = 6;
    timerTxt.innerText = `🐝 ฝูงผึ้งบุกกระแทก! ต้องรอด: ${survivalTimer}s`;

    timerInterval = setInterval(() => {
        survivalTimer--;
        if (survivalTimer <= 0) {
            clearInterval(timerInterval);
            triggerWin();
        } else {
            timerTxt.innerText = `🐝 ฝูงผึ้งบุกกระแทก! ต้องรอด: ${survivalTimer}s`;
        }
    }, 1000);
}

function triggerWin() {
    if(gameState === "lose") return;
    gameState = "win";
    winScreen.style.display = 'flex';
}

function triggerLose() {
    if(gameState === "win" || gameState === "lose") return;
    gameState = "lose";
    clearInterval(timerInterval);
    
    const messages = [
        "โหมดเบบี๋หัวใจยังหมด 5 ดวงเหรอเนี่ย! 👀",
        "ระดับง่ายยังโดนเจาะได้ ลองลากวงกลมหนาๆ ซ้อนกันดูสิ!",
        "ระดับปกติเริ่มยากขึ้นใช่ไหมล่ะ หมาทนโดนต่อยได้แค่ 5 ทีเองนะ",
        "ยากชิบหายของจริง! ผึ้งบินรุมจนเลือด 5 หยดละลายหายวับ 🔥",
        "เตือนแล้วว่ามันเป็นไปไม่ได้! ผึ้งล้อมหน้าล้อมหลังจนเลือดหมดหลอดทันที 💀"
    ];
    document.getElementById('loseMsg').innerText = messages[currentDifficulty];
    loseScreen.style.display = 'flex';
}

function backToMenu() {
    clearInterval(timerInterval);
    gameStarted = false;
    menu.style.display = 'flex';
    winScreen.style.display = 'none';
    loseScreen.style.display = 'none';
}

function drawUI() {
    ctx.save();
    ctx.font = "24px Arial";
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    
    let hearts = "";
    for(let i = 0; i < 5; i++) {
        hearts += (i < dog.hp) ? "❤️" : "🖤"; 
    }
    
    ctx.fillStyle = "#000";
    ctx.fillText(`ชีวิตหมา: ${hearts}`, 20, 20);
    ctx.restore();
}

function drawDog() {
    ctx.save();
    ctx.beginPath();
    ctx.arc(dog.x, dog.y, dog.radius, 0, Math.PI * 2);
    if (dog.hp <= 2) {
        ctx.fillStyle = "#e74c3c"; 
    } else if (dog.hp <= 4) {
        ctx.fillStyle = "#f39c12"; 
    } else {
        ctx.fillStyle = "#f1c40f"; 
    }
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = "#2c3e50";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(dog.x - 12, dog.y + 8, 10, 0, Math.PI * 2);
    ctx.arc(dog.x + 12, dog.y + 8, 10, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();

    ctx.fillStyle = "#d35400";
    ctx.fillRect(dog.x - dog.radius - 2, dog.y - 20, 10, 20);
    ctx.fillRect(dog.x + dog.radius - 8, dog.y - 20, 10, 20);

    ctx.fillStyle = "#000";
    ctx.beginPath();
    let eyeSize = (dog.hp <= 2) ? 5 : 3;
    ctx.arc(dog.x - 10, dog.y - 4, eyeSize, 0, Math.PI * 2);
    ctx.arc(dog.x + 10, dog.y - 4, eyeSize, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillRect(dog.x - 4, dog.y + 2, 8, 5);
    ctx.restore();
}

function drawLines() {
    ctx.save();
    ctx.lineWidth = 6;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#2c3e50";

    lines.forEach(line => {
        if(line.length < 2) return;
        ctx.beginPath();
        ctx.moveTo(line[0].x, line[0].y);
        for(let i = 1; i < line.length; i++) {
            ctx.lineTo(line[i].x, line[i].y);
        }
        ctx.stroke();
    });

    if (isDrawing && currentLine.length > 1) {
        ctx.strokeStyle = "#e74c3c";
        ctx.beginPath();
        ctx.moveTo(currentLine[0].x, currentLine[0].y);
        for(let i = 1; i < currentLine.length; i++) {
            ctx.lineTo(currentLine[i].x, currentLine[i].y);
        }
        ctx.stroke();
    }
    ctx.restore();
}

function mainLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameStarted) {
        bees.forEach(bee => {
            bee.update();
            bee.draw();
        });

        if (gameState === "countdown") {
            dog.vy += 0.2; 
            dog.y += dog.vy;

            lines.forEach(line => {
                for (let i = 0; i < line.length - 1; i++) {
                    let p1 = line[i];
                    let p2 = line[i+1];
                    
                    let l2 = (p1.x - p2.x)**2 + (p1.y - p2.y)**2;
                    if (l2 === 0) continue;
                    let t = ((dog.x - p1.x) * (p2.x - p1.x) + (dog.y - p1.y) * (p2.y - p1.y)) / l2;
                    t = Math.max(0, Math.min(1, t));
                    let closestX = p1.x + t * (p2.x - p1.x);
                    let closestY = p1.y + t * (p2.y - p1.y);
                    let distSq = (dog.x - closestX)**2 + (dog.y - closestY)**2;

                    if (distSq < (dog.radius + 3)**2) {
                        dog.y = closestY - dog.radius;
                        dog.vy = 0;
                    }
                }
            });

            if (dog.y + dog.radius > canvas.height) {
                triggerLose();
            }
        }

        drawLines();
        drawDog();
        drawUI(); 
    }

    requestAnimationFrame(mainLoop);
}

function getCanvasCoordinates(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    let clientX = e.clientX;
    let clientY = e.clientY;
    
    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    }

    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

function onTouchStart(e) {
    if (!gameStarted || gameState !== "drawing") return;
    e.preventDefault();
    isDrawing = true;
    const pos = getCanvasCoordinates(e);
    currentLine = [pos];
}

function onTouchMove(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const pos = getCanvasCoordinates(e);
    
    let lastPos = currentLine[currentLine.length - 1];
    let dist = Math.sqrt((pos.x - lastPos.x)**2 + (pos.y - lastPos.y)**2);
    if(dist > 5) {
        currentLine.push(pos);
    }
}

function onTouchEnd(e) {
    if (!isDrawing) return;
    isDrawing = false;
    if (currentLine.length > 1) {
        lines.push(currentLine);
    }
    startCountdown();
}

canvas.addEventListener('touchstart', onTouchStart, { passive: false });
canvas.addEventListener('touchmove', onTouchMove, { passive: false });
canvas.addEventListener('touchend', onTouchEnd, { passive: false });

canvas.addEventListener('mousedown', onTouchStart);
window.addEventListener('mousemove', onTouchMove);
window.addEventListener('mouseup', onTouchEnd);

mainLoop();
</script>

</body>
</html>
